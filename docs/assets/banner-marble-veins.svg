<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340"
     role="img" aria-label="Extra Platforms banner">
  <style>
    .frame { fill: #334155; }
    .handle-o { stroke: #334155; }
    .handle-i { stroke: #475569; }
    .title { fill: #1E293B; }
    .tagline { fill: #64748B; }
    .vl { stroke: #e2e8ef; }
    .vd { stroke: #c6cfda; }
    .bg { fill: #F8FAFC; }
  </style>
  <defs>
    <radialGradient id="glass" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E2E8F0" stop-opacity="0.7"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect class="bg" width="1280" height="340"/>
  <!-- Marble veins (traced from original banner-27-marble-veins.png) -->
  <g fill="none">
    <path class="vl" stroke-width="7"
          d="M -20 58 C 200 78, 500 70, 750 66 S 1050 62, 1300 42"/>
    <path class="vd" stroke-width="8"
          d="M -20 118 C 200 100, 500 97, 800 86 S 1100 90, 1300 110"/>
    <path class="vl" stroke-width="7"
          d="M -20 152 C 200 148, 450 132, 650 127 S 950 142, 1300 152"/>
    <path class="vd" stroke-width="8"
          d="M -20 220 C 200 210, 500 200, 800 196 S 1100 180, 1300 178"/>
    <path class="vl" stroke-width="7"
          d="M -20 254 C 200 248, 500 240, 700 236 S 950 248, 1300 276"/>
    <path class="vd" stroke-width="8"
          d="M -20 286 C 150 272, 300 268, 550 278 S 800 300, 1000 300 S 1200 296, 1300 296"/>
  </g>
  <!-- Logo (scaled to fit banner height) -->
  <g transform="translate(15, 15) scale(0.484)">
    <!-- Handle -->
    <line class="handle-o" x1="396" y1="392" x2="554" y2="550"
          stroke-width="56" stroke-linecap="round"/>
    <line class="handle-i" x1="396" y1="392" x2="554" y2="550"
          stroke-width="40" stroke-linecap="round"/>
    <!-- Lens ring -->
    <circle class="frame" cx="258" cy="252" r="200"/>
    <!-- Lens glass -->
    <circle cx="258" cy="252" r="178" fill="url(#glass)"/>
    <!-- Highlight arc -->
    <path d="M 142 172 A 148 148 0 0 1 308 124"
          fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <!-- Trait category dots -->
    <circle cx="183" cy="198" r="32" fill="#F59E0B"/>
    <circle cx="258" cy="198" r="32" fill="#3B82F6"/>
    <circle cx="333" cy="198" r="32" fill="#EF4444"/>
    <circle cx="183" cy="306" r="32" fill="#10B981"/>
    <circle cx="258" cy="306" r="32" fill="#8B5CF6"/>
    <circle cx="333" cy="306" r="32" fill="#06B6D4"/>
  </g>
  <!-- Title -->
  <text class="title" x="370" y="190"
        font-family="'Inter', 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="76" font-weight="700" letter-spacing="1">Extra Platforms</text>
  <!-- Tagline -->
  <text class="tagline" x="372" y="238"
        font-family="'Inter', 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="25" font-weight="400">Detect &amp; group runtime environments</text>
</svg>
